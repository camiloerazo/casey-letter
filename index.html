<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Letter for Casey! Att: Cami</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="letter-container">
        <div class="text-wrapper">
            <span id="letter-text"></span><span class="cursor"></span>
        </div>
    </div>

    <!-- Images container (hidden initially) -->
    <div id="images-container" style="display: none;"></div>

    <!-- Audio controls -->
    <div class="audio-controls">
        <button id="mute-btn" class="control-btn">🔊</button>
        <input type="range" id="volume-slider" min="0" max="100" value="50">
    </div>

    <!-- Audio element -->
    <audio id="background-music" loop>
        <source src="music/song.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <script src="script.js"></script>
</body>
</html>
